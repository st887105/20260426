<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>gpt-image-2 生圖工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 320px;
    --header-h: 50px;
    --bg: #f4f4f0;
    --surface: #fff;
    --border: #e5e5e5;
    --border2: #d0d0d0;
    --text: #1a1a1a;
    --muted: #888;
    --faint: #bbb;
    --green: #2d7d46;
    --blue: #185fa5;
    --red: #c0392b;
    --input-bg: #fafafa;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 28px; height: 28px; background: var(--text); border-radius: 6px; display: grid; place-items: center; flex-shrink: 0; }
  .logo svg { width: 14px; height: 14px; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header span { font-size: 11px; color: var(--faint); }
  .menu-btn { display: none; margin-left: auto; background: none; border: none; cursor: pointer; padding: 6px; color: var(--text); }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - var(--header-h)); }

  /* ── Sidebar ── */
  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: transform 0.25s ease; }
  .mode-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .mode-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s; }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .mode-tab:hover:not(.active) { background: #f8f8f8; }

  .sidebar-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }

  .section-label { font-size: 10px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }

  /* inputs */
  .key-wrap { position: relative; }
  .key-wrap input { width: 100%; padding: 8px 32px 8px 10px; border: 1px solid var(--border2); border-radius: 7px; font-size: 12px; font-family: monospace; background: var(--input-bg); color: var(--text); outline: none; }
  .key-wrap input:focus { border-color: var(--text); background: var(--surface); }
  .eye-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--faint); font-size: 12px; padding: 2px; }
  .key-status { font-size: 11px; margin-top: 4px; }
  .key-status.ok { color: var(--green); }
  .key-status.err { color: var(--red); }

  textarea { width: 100%; padding: 9px 10px; border: 1px solid var(--border2); border-radius: 7px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 80px; background: var(--input-bg); color: var(--text); outline: none; line-height: 1.5; }
  textarea:focus { border-color: var(--text); background: var(--surface); }

  .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
  .opt select { width: 100%; padding: 6px 8px; border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; background: var(--input-bg); color: var(--text); outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 8px center; padding-right: 24px; }
  .opt select:focus { border-color: var(--text); }
  .opt.dim { opacity: 0.4; pointer-events: none; }

  /* upload zone */
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: 8px; padding: 12px; text-align: center; position: relative; background: var(--input-bg); transition: all 0.15s; cursor: pointer; }
  .upload-zone:hover { border-color: #aaa; background: #f0f0ed; }
  .upload-zone.has-file { border-color: var(--green); background: #f0faf3; border-style: solid; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 18px; }
  .upload-text { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .upload-zone.has-file .upload-text { color: var(--green); font-weight: 500; }
  .upload-preview { width: 100%; max-height: 90px; object-fit: contain; margin-top: 8px; border-radius: 5px; display: none; }
  .clear-btn { position: absolute; top: 5px; right: 5px; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; font-size: 10px; padding: 2px 6px; cursor: pointer; color: var(--muted); z-index: 2; display: none; }
  .upload-zone.has-file .clear-btn { display: block; }

  .hint { font-size: 11px; color: var(--faint); line-height: 1.5; margin-top: 4px; }

  /* cost */
  .cost-box { font-size: 11px; color: var(--muted); background: var(--bg); padding: 7px 9px; border-radius: 6px; line-height: 1.6; }
  .cost-box strong { color: var(--text); }

  /* button */
  .run-btn { width: 100%; padding: 11px; background: var(--text); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .run-btn:hover { background: #333; }
  .run-btn:active { transform: scale(0.98); }
  .run-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .prog-bar { height: 3px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 6px; display: none; }
  .prog-bar.show { display: block; }
  .prog-fill { height: 100%; background: var(--text); border-radius: 2px; animation: prog 18s ease-out forwards; }
  @keyframes prog { from { width: 0; } to { width: 88%; } }

  /* ── Canvas ── */
  .canvas { flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; gap: 10px; min-height: 300px; }
  .empty-state svg { width: 40px; height: 40px; }
  .empty-state p { font-size: 13px; }

  .results-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .results-hdr h2 { font-size: 12px; font-weight: 600; color: var(--faint); }
  .clr-all { font-size: 11px; color: var(--faint); background: none; border: none; cursor: pointer; padding: 3px 7px; border-radius: 5px; }
  .clr-all:hover { background: #eee; color: var(--muted); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .img-card { background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .img-card img { width: 100%; display: block; }
  .card-foot { padding: 8px 10px; display: flex; align-items: center; gap: 6px; border-top: 1px solid #f2f2f2; }
  .card-meta { font-size: 10px; color: var(--faint); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-btns { display: flex; gap: 4px; flex-shrink: 0; }
  .cbtn { padding: 4px 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 11px; cursor: pointer; background: var(--surface); color: var(--text); text-decoration: none; white-space: nowrap; transition: background 0.1s; }
  .cbtn:hover { background: var(--bg); }
  .cbtn.blue { border-color: #b8d4f0; color: var(--blue); }
  .cbtn.blue:hover { background: #eaf2fb; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-right: 3px; }
  .b-gen { background: #eaf3de; color: #3b6d11; }
  .b-edit { background: #e6f1fb; color: var(--blue); }

  .err-bar { background: #fef2f2; border: 1px solid #fecaca; border-radius: 7px; padding: 9px 12px; font-size: 12px; color: var(--red); margin-bottom: 12px; display: none; line-height: 1.5; }
  .err-bar.show { display: block; }

  .hidden { display: none !important; }

  /* ── Overlay for mobile ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    :root { --sidebar-w: 85vw; }
    .menu-btn { display: flex; align-items: center; }
    .sidebar { position: fixed; top: var(--header-h); left: 0; height: calc(100vh - var(--header-h)); z-index: 95; transform: translateX(-100%); box-shadow: 4px 0 20px rgba(0,0,0,0.12); }
    .sidebar.open { transform: translateX(0); }
    .overlay.show { display: block; }
    .canvas { padding: 12px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .card-meta { display: none; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
  @media (min-width: 681px) and (max-width: 900px) {
    :root { --sidebar-w: 280px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="#fff" stroke="none"/><polyline points="21,15 16,10 5,21"/></svg>
  </div>
  <h1>gpt-image-2 生圖工具</h1>
  <span>OpenAI API</span>
  <button class="menu-btn" onclick="toggleMenu()" aria-label="選單">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/></svg>
  </button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabGen" onclick="switchMode('gen')">✦ 生圖</button>
      <button class="mode-tab" id="tabEdit" onclick="switchMode('edit')">✎ 改圖</button>
    </div>
    <div class="sidebar-body">

      <!-- API Key -->
      <div>
        <div class="section-label">OpenAI API Key</div>
        <div class="key-wrap">
          <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
          <button class="eye-btn" onclick="toggleKey()">👁</button>
        </div>
        <div class="key-status" id="keyStatus"></div>
      </div>

      <!-- Prompt -->
      <div>
        <div class="section-label" id="promptLabel">圖片描述</div>
        <textarea id="prompt" placeholder="畫一隻穿西裝的龍蝦，扁平插畫風格..."></textarea>
      </div>

      <!-- 來源圖（改圖用） -->
      <div id="srcSection" class="hidden">
        <div class="section-label">來源圖片 <span style="color:#e55;font-weight:400">必填</span></div>
        <div class="upload-zone" id="srcZone">
          <input type="file" id="srcFile" accept="image/png,image/jpeg,image/webp" onchange="handleFile('src',this)">
          <button class="clear-btn" onclick="clearFile(event,'src')">✕ 清除</button>
          <div class="upload-icon">🖼</div>
          <div class="upload-text" id="srcText">點擊上傳 PNG / JPEG / WebP</div>
          <img class="upload-preview" id="srcPreview">
        </div>
        <p class="hint">非 PNG 會自動轉換。</p>
      </div>

      <!-- 遮罩（改圖用） -->
      <div id="maskSection" class="hidden">
        <div class="section-label">遮罩 <span style="color:#aaa;font-weight:400">選填</span></div>
        <div class="upload-zone" id="maskZone">
          <input type="file" id="maskFile" accept="image/png" onchange="handleFile('mask',this)">
          <button class="clear-btn" onclick="clearFile(event,'mask')">✕ 清除</button>
          <div class="upload-icon">⬜</div>
          <div class="upload-text" id="maskText">黑色保留 / 白色替換（PNG）</div>
          <img class="upload-preview" id="maskPreview">
        </div>
        <p class="hint">不上傳時對整張圖改圖。</p>
      </div>

      <!-- 選項 -->
      <div>
        <div class="section-label">選項</div>
        <div class="opts-grid">
          <div class="opt">
            <label>尺寸</label>
            <select id="size">
              <option value="1024x1024">1024×1024（方）</option>
              <option value="1536x1024">1536×1024（橫）</option>
              <option value="1024x1536">1024×1536（直）</option>
            </select>
          </div>
          <div class="opt" id="qualityOpt">
            <label>品質</label>
            <select id="quality" onchange="updateCost()">
              <option value="low">low（NT$0.3）</option>
              <option value="medium">medium（NT$1.3）</option>
              <option value="high">high（NT$5.5）</option>
            </select>
          </div>
          <div class="opt" id="countOpt">
            <label>張數</label>
            <select id="count" onchange="updateCost()">
              <option value="1">1 張</option>
              <option value="2">2 張</option>
              <option value="4">4 張</option>
            </select>
          </div>
          <div class="opt">
            <label>格式</label>
            <select id="format">
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="webp">WebP</option>
            </select>
          </div>
        </div>
      </div>

      <div class="cost-box" id="costBox">預估費用：<strong>~NT$0.3</strong>（1 張 × low）</div>

      <button class="run-btn" id="runBtn" onclick="run()">
        <div class="spinner" id="spinner"></div>
        <span id="runText">生成圖片</span>
      </button>
      <div class="prog-bar" id="progBar"><div class="prog-fill"></div></div>

    </div>
  </div><!-- /sidebar -->

  <div class="canvas" id="canvas">
    <div class="results-hdr" id="resultsHdr" style="display:none">
      <h2>生成結果</h2>
      <button class="clr-all" onclick="clearAll()">清除全部</button>
    </div>
    <div class="err-bar" id="errBar"></div>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <p>輸入 API Key 與描述，按下生成</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const COST = { low: 0.3, medium: 1.3, high: 5.5 };
let mode = 'gen';
let files = { src: null, mask: null };

/* ── mobile menu ── */
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeMenu() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ── mode ── */
function switchMode(m) {
  mode = m;
  document.getElementById('tabGen').classList.toggle('active', m === 'gen');
  document.getElementById('tabEdit').classList.toggle('active', m === 'edit');
  document.getElementById('srcSection').classList.toggle('hidden', m !== 'edit');
  document.getElementById('maskSection').classList.toggle('hidden', m !== 'edit');
  document.getElementById('promptLabel').textContent = m === 'edit' ? '改圖指令' : '圖片描述';
  document.getElementById('prompt').placeholder = m === 'edit'
    ? '把背景換成海底世界，保留前景主體...' : '畫一隻穿西裝的龍蝦，扁平插畫風格...';
  document.getElementById('runText').textContent = m === 'edit' ? '開始改圖' : '生成圖片';
  // 改圖模式：quality 和 count 都不支援
  const qOpt = document.getElementById('qualityOpt');
  const cOpt = document.getElementById('countOpt');
  if (m === 'edit') {
    qOpt.classList.add('dim');
    cOpt.classList.add('dim');
    document.getElementById('count').value = '1';
  } else {
    qOpt.classList.remove('dim');
    cOpt.classList.remove('dim');
  }
  updateCost();
}

/* ── file ── */
function handleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    files[type] = { base64: b64, mimeType: file.type };
    const zone = document.getElementById(type + 'Zone');
    zone.classList.add('has-file');
    document.getElementById(type + 'Text').textContent = file.name.length > 26
      ? file.name.slice(0, 24) + '…' : file.name;
    const prev = document.getElementById(type + 'Preview');
    prev.src = e.target.result; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function clearFile(e, type) {
  e.stopPropagation();
  files[type] = null;
  document.getElementById(type + 'File').value = '';
  document.getElementById(type + 'Zone').classList.remove('has-file');
  document.getElementById(type + 'Text').textContent = type === 'src'
    ? '點擊上傳 PNG / JPEG / WebP' : '黑色保留 / 白色替換（PNG）';
  const prev = document.getElementById(type + 'Preview');
  prev.src = ''; prev.style.display = 'none';
}

/* ── key ── */
function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
document.getElementById('apiKey').addEventListener('input', function() {
  const v = this.value.trim();
  const st = document.getElementById('keyStatus');
  if (!v) { st.textContent = ''; return; }
  const ok = v.startsWith('sk-') && v.length > 20;
  st.textContent = ok ? '格式看起來正確' : '應為 sk-... 開頭';
  st.className = 'key-status ' + (ok ? 'ok' : 'err');
  localStorage.setItem('oai_key', v);
});

/* ── cost ── */
function updateCost() {
  const q = document.getElementById('quality').value;
  const n = mode === 'edit' ? 1 : parseInt(document.getElementById('count').value);
  document.getElementById('costBox').innerHTML =
    mode === 'edit'
      ? '改圖不支援 quality 參數，費用以 standard 計。'
      : `預估費用：<strong>~NT$${(COST[q] * n).toFixed(1)}</strong>（${n} 張 × ${q}）`;
}
document.getElementById('count').addEventListener('change', updateCost);
document.getElementById('quality').addEventListener('change', updateCost);

/* ── init ── */
window.onload = () => {
  const s = localStorage.getItem('oai_key');
  if (s) {
    document.getElementById('apiKey').value = s;
    document.getElementById('keyStatus').textContent = '已載入上次的 Key';
    document.getElementById('keyStatus').className = 'key-status ok';
  }
};

function showErr(msg) {
  const b = document.getElementById('errBar');
  b.textContent = msg; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 10000);
}

function setLoading(on) {
  document.getElementById('runBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('runText').textContent = on
    ? (mode === 'edit' ? '改圖中...' : '生成中...')
    : (mode === 'edit' ? '開始改圖' : '生成圖片');
  const pb = document.getElementById('progBar');
  if (on) { pb.classList.add('show'); pb.innerHTML = '<div class="prog-fill"></div>'; }
  else pb.classList.remove('show');
}

function b64toBlob(b64, mime) {
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}
function convertToPng(b64, mime) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      c.toBlob(blob => blob ? res(blob) : rej(new Error('PNG 轉換失敗')), 'image/png');
    };
    img.onerror = () => rej(new Error('無法讀取圖片'));
    img.src = `data:${mime};base64,${b64}`;
  });
}

/* ── run ── */
async function run() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  if (!apiKey) { showErr('請先填入 OpenAI API Key'); return; }
  if (!prompt) { showErr('請填入描述 / 指令'); return; }
  if (mode === 'edit' && !files.src) { showErr('改圖模式需要上傳來源圖片'); return; }

  const size = document.getElementById('size').value;
  const quality = document.getElementById('quality').value;
  const n = mode === 'edit' ? 1 : parseInt(document.getElementById('count').value);
  const format = document.getElementById('format').value;

  setLoading(true);
  closeMenu();
  try {
    const data = mode === 'gen'
      ? await apiGen(apiKey, prompt, size, quality, n, format)
      : await apiEdit(apiKey, prompt, size, format);
    render(data, prompt, size, quality, format);
  } catch(e) { showErr(e.message); }
  finally { setLoading(false); }
}

async function apiGen(apiKey, prompt, size, quality, n, format) {
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model: 'gpt-image-2', prompt, size, quality, n,
      output_format: format, response_format: 'b64_json' })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || `API 錯誤 ${res.status}`);
  return data;
}

async function apiEdit(apiKey, prompt, size, format) {
  // ⚠️ /v1/images/edits 不支援 quality、output_format、n>1
  const fd = new FormData();
  fd.append('model', 'gpt-image-2');
  fd.append('prompt', prompt);
  fd.append('size', size);
  fd.append('n', '1');
  fd.append('response_format', 'b64_json');

  const srcBlob = files.src.mimeType === 'image/png'
    ? b64toBlob(files.src.base64, 'image/png')
    : await convertToPng(files.src.base64, files.src.mimeType);
  fd.append('image', srcBlob, 'source.png');

  if (files.mask) {
    fd.append('mask', b64toBlob(files.mask.base64, 'image/png'), 'mask.png');
  }

  const res = await fetch('https://api.openai.com/v1/images/edits', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}` },
    body: fd
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || `API 錯誤 ${res.status}`);
  return data;
}

/* ── render ── */
function render(data, prompt, size, quality, format) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsHdr').style.display = 'flex';
  const grid = document.getElementById('grid');
  const ts = new Date().toLocaleTimeString('zh-TW');
  const mimeMap = { jpeg: 'image/jpeg', webp: 'image/webp', png: 'image/png' };
  const mime = mimeMap[format] || 'image/png';
  const badge = mode === 'edit'
    ? '<span class="badge b-edit">改圖</span>'
    : '<span class="badge b-gen">生圖</span>';

  data.data.forEach((item, i) => {
    const src = `data:${mime};base64,${item.b64_json}`;
    const fname = `gpt-image-${mode}-${Date.now()}-${i+1}.${format}`;
    const meta = mode === 'gen' ? `${ts} · ${quality} · ${size.replace('x','×')}` : `${ts} · ${size.replace('x','×')}`;

    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <img src="${src}" alt="generated" loading="lazy">
      <div class="card-foot">
        <div class="card-meta">${badge}${meta}</div>
        <div class="card-btns">
          <a class="cbtn" href="${src}" download="${fname}">下載</a>
          <button class="cbtn blue">送改圖</button>
        </div>
      </div>`;
    card.querySelector('.cbtn.blue').addEventListener('click', () => loadForEdit(src));
    grid.insertBefore(card, grid.firstChild);
  });
}

function loadForEdit(dataSrc) {
  const [header, b64] = dataSrc.split(',');
  const mime = header.match(/data:([^;]+)/)[1];
  files.src = { base64: b64, mimeType: mime };
  switchMode('edit');
  document.getElementById('srcZone').classList.add('has-file');
  document.getElementById('srcText').textContent = '已載入生成結果';
  const prev = document.getElementById('srcPreview');
  prev.src = dataSrc; prev.style.display = 'block';
}

function clearAll() {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('resultsHdr').style.display = 'none';
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) run();
});
</script>
